name: deploy-webhook-relay

services:
  deploy-webhook-relay:
    build:
      context: .
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890
        NO_PROXY: localhost,127.0.0.1,::1
    image: local/deploy-webhook-relay:latest
    container_name: deploy-webhook-relay
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      arcane-mgmt-net:
        aliases:
          - deploy-webhook-relay

networks:
  arcane-mgmt-net:
    external: true
    name: arcane-mgmt-net
